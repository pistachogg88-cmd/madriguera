<!doctype html>
<html>
<head>
    <meta charset="utf-8">
    <title>Inicio</title>

    <!-- Google Font -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif:ital,wght@0,300..700;1,300..700&display=swap" rel="stylesheet">

    <style>
        body {
            font-family: 'Noto Serif', serif;
            background-image: url('imagenes/fondodepantalla.JPEG');
            background-size: cover;
            background-repeat: no-repeat;
            background-attachment: fixed;
            color: white;
            margin: 0;
        }

        .menu-boton {
            background-color: #B39DDB;
            color: white;
            border: none;
            padding: 15px 30px;
            font-size: 20px;
            cursor: pointer;
            border-radius: 10px;
            transition: 0.3s;
        }

            .menu-boton:hover {
                background-color: #9575CD;
            }

        .menu-desplegable {
            display: none;
            margin-top: 20px;
        }

            .menu-desplegable a {
                display: block;
                margin: 15px 0;
            }

            .menu-desplegable img {
                width: 190px;
                transition: 0.3s;
            }

                .menu-desplegable img:hover {
                    transform: scale(1.05);
                }
    </style>
</head>

<body>

    <header style="background-color:#B39DDB; text-align:center; padding:20px;">
        <h1 style="font-size:3em;">
            La madriguera del conejo – Evelyn
        </h1>
        <img src="imagenes/ojoboton1.PNG" width="80">
    </header>

    <section style="padding:80px; text-align:center;">

        <h2>INICIO</h2>
        <p>Bienvenido a la madriguera del conejo, ¿a dónde quieres ir?</p>

        <br>

        <!-- BOTÓN DESPLEGABLE -->
        <button class="menu-boton" onclick="mostrarMenu()">
            ☰ Entrar a la madriguera
        </button>

        <!-- SECCIONES -->
        <div class="menu-desplegable" id="menu">

            <a href="seccion1.html">
                <img src="imagenes/botonseccion1.PNG">
            </a>

            <a href="seccion2.html">
                <img src="imagenes/botonseccion2.PNG">
            </a>

            <a href="seccion3.html">
                <img src="imagenes/botonseccion3.PNG">
            </a>

        </div>

    </section>

    <footer style="background-color:#B39DDB; text-align:center; padding:20px; margin-top:50px;">

        <a href="https://www.instagram.com" target="_blank">
            <img src="imagenes/iconodeinsta.JPEG" width="60" style="margin:10px;">
        </a>

        <a href="https://www.twitter.com" target="_blank">
            <img src="imagenes/iconodex.JPEG" width="60" style="margin:10px;">
        </a>

        <a href="https://www.facebook.com" target="_blank">
            <img src="imagenes/iconofaceboock.JPEG" width="60" style="margin:10px;">
        </a>

    </footer>

    <script>
function mostrarMenu() {
    var menu = document.getElementById("menu");
    if (menu.style.display === "block") {
        menu.style.display = "none";
    } else {
        menu.style.display = "block";
    }
}
    </script>

</body>
</html>
